<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SUDOKU — Logic Puzzle</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<header>
  <div class="logo-label">✦ Puzzle &amp; Logic</div>
  <h1>SU<span>DO</span>KU</h1>
  <p class="tagline">The classic number placement puzzle</p>
</header>

<div class="status-bar">
  <div class="stat-pill">
    <span class="label">Time</span>
    <span class="value" id="timer-val">00:00</span>
  </div>
  <div class="stat-pill">
    <span class="label">Errors</span>
    <span class="value" id="errors-val">0</span>
  </div>
  <div class="stat-pill">
    <span class="label">Left</span>
    <span class="value" id="left-val">—</span>
  </div>
</div>

<div class="difficulty-tabs">
  <button class="diff-tab active" onclick="setDifficulty('easy')">Easy</button>
  <button class="diff-tab" onclick="setDifficulty('medium')">Medium</button>
  <button class="diff-tab" onclick="setDifficulty('hard')">Hard</button>
  <button class="diff-tab" onclick="setDifficulty('blank')">Blank</button>
</div>

<div class="grid-wrapper">
  <div id="grid"></div>
</div>

<div class="numpad" id="numpad"></div>

<div class="actions">
  <button class="btn primary" onclick="solveSudoku()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    Solve
  </button>
  <button class="btn" id="notes-btn" onclick="toggleNotes()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    Notes
  </button>
  <button class="btn" onclick="undo()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/></svg>
    Undo
  </button>
  <button class="btn" onclick="validateBoard()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
    Check
  </button>
  <button class="btn danger" onclick="clearGrid()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
    Clear
  </button>
</div>

<div id="toast"></div>

<div id="win-overlay">
  <div class="win-card">
    <div class="win-emoji">✦</div>
    <div class="win-title">Solved!</div>
    <div class="win-subtitle">Puzzle complete. Well played.</div>
    <div class="win-stats">
      <div class="win-stat">
        <div class="ws-val" id="win-time">—</div>
        <div class="ws-label">Time</div>
      </div>
      <div class="win-stat">
        <div class="ws-val" id="win-errors">—</div>
        <div class="ws-label">Errors</div>
      </div>
    </div>
    <button class="btn primary" onclick="newGame()" style="margin:0 auto">New Game</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
